<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rising Phoenix Enterprises</title>

<!-- TYPEWRITER FONT -->
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">

<style>

:root{
--bg:#000;
--ivory:#f5f1e8;
--gold:#c6a96b;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
background:radial-gradient(circle at center,#020202 0%,#000 100%);
color:var(--ivory);
}

/* CENTER LAYOUT */

.wrap{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.inner{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* LOGO (DOMINANT) */

.logo{
width:clamp(320px,36vw,520px);
margin-bottom:10px;

filter:
drop-shadow(0 22px 48px rgba(0,0,0,.55))
drop-shadow(0 2px 8px rgba(198,169,107,.22));
}

/* TYPED AUTHORITY TEXT */

.title{
font-family:"IBM Plex Mono","Courier New",monospace;

font-size:clamp(14px,1.05vw,18px);
font-weight:500;

letter-spacing:.28em;
text-transform:uppercase;

opacity:.9;
margin-bottom:34px;

white-space:nowrap;
overflow:hidden;
border-right:2px solid rgba(198,169,107,.85);

animation:
typing 2.4s steps(26,end),
blink .8s step-end infinite;
}

/* TYPING EFFECT */

@keyframes typing{
from{width:0}
to{width:26ch}
}

/* CURSOR BLINK */

@keyframes blink{
from,to{border-color:transparent}
50%{border-color:rgba(198,169,107,.85)}
}

/* ENTER BUTTON */

.enter{
font-family:"IBM Plex Mono","Courier New",monospace;

font-size:16px;
letter-spacing:.22em;

color:var(--ivory);
text-decoration:none;

border:1px solid var(--gold);
padding:14px 38px;

transition:.18s ease;
}

.enter:hover{
background:rgba(198,169,107,.08);
}

/* MOBILE */

@media(max-width:768px){

.logo{
width:clamp(240px,55vw,340px);
}

.title{
font-size:clamp(12px,3.5vw,16px);
margin-bottom:26px;
}

.enter{
font-size:14px;
padding:12px 26px;
}

}

</style>

</head>

<body>

<div class="wrap">
<div class="inner">

<img src="phoenix-os-logo.png" class="logo">

<h1 class="title">Rising Phoenix Enterprises</h1>

<a href="institution.html" class="enter">ENTER</a>

</div>
</div>

</body>

</html>
