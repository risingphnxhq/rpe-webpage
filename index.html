<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rising Phoenix Enterprises</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- PBRS FONT -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#000;
--ivory:#f5f1e8;
--gold:#c6a96b;
}

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
background:
radial-gradient(circle at center,#020202 0%,#000 100%);
color:var(--ivory);
font-family:"Playfair Display",serif;
}

/* LAYOUT */

.wrap{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.inner{
transform:translateY(-2vh);
}

/* HERO LOGO */

.logo{
width:clamp(260px,30vw,440px);
height:auto;
margin-bottom:34px;

filter:
drop-shadow(0 18px 40px rgba(0,0,0,.45))
drop-shadow(0 2px 6px rgba(198,169,107,.18));
}

/* TITLE (FIXED) */

.title{
font-size:clamp(30px,2.4vw,42px);
font-weight:700;
letter-spacing:.015em;
margin-bottom:48px;
}

/* ENTER (PBRS MATCH) */

.enter{
font-size:17px;
letter-spacing:.22em;
color:var(--gold);
text-decoration:none;
position:relative;
display:inline-block;
padding-bottom:4px;
}

.enter::after{
content:"";
position:absolute;
left:0;
bottom:-5px;
width:100%;
height:1px;
background:var(--gold);
transform:scaleX(0);
transform-origin:left;
transition:transform .18s ease;
}

.enter:hover::after{
transform:scaleX(1);
}

/* MOBILE */

@media(max-width:768px){

.logo{
width:clamp(200px,48vw,280px);
margin-bottom:24px;
}

.title{
font-size:clamp(24px,7vw,34px);
margin-bottom:38px;
}

.enter{
font-size:15px;
letter-spacing:.18em;
}

}

</style>
</head>

<body>

<div class="wrap">
<div class="inner">

<img src="phoenix-os-logo.png" class="logo" alt="Rising Phoenix Enterprises Logo">

<h1 class="title">Rising Phoenix Enterprises</h1>

<a href="institution.html" class="enter">ENTER</a>

</div>
</div>

</body>
</html>
