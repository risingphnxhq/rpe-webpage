<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rising Phoenix Enterprises</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">

<style>

:root{
--ivory:#f5f1e8;
--gold:#c6a96b;
--gold-soft:#d7b97c;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
background:#000;
color:var(--ivory);
font-family:"IBM Plex Mono","Courier New",monospace;
}

/* ===== HERO AREA ===== */

.hero{
height:70vh;

background:
radial-gradient(circle at center, rgba(0,0,0,.08), #000 70%),
url("phoenix-os-logo.png") center 40% / 520px no-repeat;

display:flex;
align-items:flex-end;
justify-content:center;
}

/* ===== TEXT AREA BELOW HERO ===== */

.content{
height:30vh;

display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;

padding-top:30px;
text-align:center;
}

/* ===== TITLE ===== */

.title{
font-size:clamp(14px,1.05vw,18px);
letter-spacing:.22em;
text-transform:uppercase;

margin-bottom:28px;
}

/* ===== BUTTON ===== */

.enter{
border:1px solid var(--gold);
padding:14px 42px;

color:var(--ivory);
text-decoration:none;

letter-spacing:.18em;
font-size:15px;

transition:.2s ease;
}

.enter:hover{
background:rgba(198,169,107,.08);
border-color:var(--gold-soft);
}

/* ===== MOBILE ===== */

@media(max-width:768px){

.hero{
height:65vh;
background:
radial-gradient(circle at center, rgba(0,0,0,.10), #000 75%),
url("phoenix-os-logo.png") center 38% / 320px no-repeat;
}

.content{
height:35vh;
padding-top:22px;
}

.title{
font-size:14px;
letter-spacing:.16em;
margin-bottom:22px;
}

.enter{
padding:12px 28px;
font-size:14px;
}

}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero"></section>

<!-- TEXT BELOW HERO -->
<section class="content">

<h1 class="title">Rising Phoenix Enterprises</h1>

<a href="institution.html" class="enter">ENTER</a>

</section>

</body>
</html>
