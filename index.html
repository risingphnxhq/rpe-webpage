<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rising Phoenix Enterprises</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000000;
      --bg-deep: #020202;
      --ivory: #f5f1e8;
      --gold: #c6a96b;
      --gold-soft: #d7b97c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, var(--bg-deep) 0%, var(--bg) 100%);
      color: var(--ivory);
      overflow: hidden;
    }

    body {
      font-family: "Cormorant Garamond", serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .gate {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .gate-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      transform: translateY(-1vh);
      width: 100%;
      max-width: 1100px;
    }

    .hero-logo {
      width: clamp(300px, 34vw, 500px);
      height: auto;
      display: block;
      margin: 0 auto 8px auto;
      filter:
        drop-shadow(0 18px 40px rgba(0,0,0,0.45))
        drop-shadow(0 2px 8px rgba(198,169,107,0.16));
    }

    .company-name {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(42px, 4.3vw, 68px);
      font-weight: 600;
      line-height: 1.02;
      letter-spacing: 0.01em;
      color: var(--ivory);
      margin-top: -6px;
      margin-bottom: 26px;
    }

    .enter-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 210px;
      padding: 14px 34px;
      border: 1px solid var(--gold);
      color: var(--ivory);
      text-decoration: none;
      font-family: "Cormorant Garamond", serif;
      font-size: 19px;
      font-weight: 600;
      letter-spacing: 0.16em;
      transition: background 180ms ease, border-color 180ms ease, color 180ms ease;
    }

    .enter-link:hover {
      background: rgba(198,169,107,0.08);
      border-color: var(--gold-soft);
    }

    @media (max-width: 768px) {
      .gate-inner {
        transform: translateY(0);
      }

      .hero-logo {
        width: clamp(220px, 54vw, 320px);
        margin-bottom: 6px;
      }

      .company-name {
        font-size: clamp(30px, 9vw, 46px);
        margin-bottom: 18px;
      }

      .enter-link {
        min-width: 180px;
        padding: 12px 24px;
        font-size: 16px;
        letter-spacing: 0.12em;
      }
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="gate-inner">
      <img
        src="phoenix-os-logo.png"
        alt="Rising Phoenix Enterprises logo"
        class="hero-logo"
      />

      <h1 class="company-name">Rising Phoenix Enterprises</h1>

      <a href="institution.html" class="enter-link">ENTER</a>
    </div>
  </main>
</body>
</html>
