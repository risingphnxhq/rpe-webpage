<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rising Phoenix Enterprises</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000000;
      --ivory: #f5f1e8;
      --gold: #c6a96b;
      --gold-soft: #d7b97c;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--ivory);
      font-family: "IBM Plex Mono", "Courier New", monospace;
    }

    body {
      position: relative;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* BACKGROUND LAYER */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0;
      animation: bgFadeIn 1.8s ease forwards;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0) 25%),
        radial-gradient(circle at center, rgba(0,0,0,0.08), #000 70%),
        url("phoenix-os-logo.png") center 32% / 540px no-repeat;
    }

    .bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(198,169,107,0.08) 0%, rgba(198,169,107,0.00) 35%);
      mix-blend-mode: screen;
      opacity: 0.55;
      animation: glowPulse 4.8s ease-in-out infinite;
      pointer-events: none;
    }

    /* FOREGROUND CONTENT */
    .foreground {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding-top: 260px;
    }

    .title {
      font-size: clamp(14px, 1.05vw, 18px);
      font-weight: 500;
      letter-spacing: 0.30em;
      text-transform: uppercase;
      color: var(--ivory);
      white-space: nowrap;
      overflow: hidden;
      border-right: 2px solid rgba(198,169,107,0.9);
      margin-bottom: 34px;
      opacity: 0;
      width: 0;
      animation:
        titleReveal 0.1s linear 1.4s forwards,
        typing 2.4s steps(26, end) 1.4s forwards,
        blink 0.8s step-end infinite 1.4s;
    }

    .enter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 210px;
      padding: 14px 40px;
      border: 1px solid var(--gold);
      color: var(--ivory);
      text-decoration: none;
      font-size: 15px;
      letter-spacing: 0.22em;
      opacity: 0;
      transform: translateY(8px);
      animation: enterFadeIn 0.8s ease 4s forwards;
      transition: background 180ms ease, border-color 180ms ease, color 180ms ease;
    }

    .enter:hover {
      background: rgba(198,169,107,0.08);
      border-color: var(--gold-soft);
    }

    /* ANIMATIONS */
    @keyframes bgFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.38; }
      50% { opacity: 0.62; }
    }

    @keyframes titleReveal {
      to {
        opacity: 0.92;
      }
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 26ch; }
    }

    @keyframes blink {
      from, to { border-color: transparent; }
      50% { border-color: rgba(198,169,107,0.9); }
    }

    @keyframes enterFadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .bg {
        background:
          radial-gradient(circle at center, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0) 25%),
          radial-gradient(circle at center, rgba(0,0,0,0.10), #000 72%),
          url("phoenix-os-logo.png") center 28% / 320px no-repeat;
      }

      .foreground {
        padding-top: 210px;
      }

      .title {
        font-size: clamp(12px, 3.4vw, 15px);
        letter-spacing: 0.18em;
        margin-bottom: 24px;
      }

      .enter {
        min-width: 180px;
        padding: 12px 26px;
        font-size: 14px;
        letter-spacing: 0.16em;
      }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <main class="foreground">
    <h1 class="title">Rising Phoenix Enterprises</h1>
    <a href="institution.html" class="enter">ENTER</a>
  </main>

</body>
</html>
