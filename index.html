<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rising Phoenix Enterprises</title>
  <meta name="description" content="Rising Phoenix Enterprises" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000000;
      --bg-deep: #020202;
      --ivory: #f5f1e8;
      --gold: #c6a96b;
      --gold-hi: #f2d189;
      --gold-low: #8f6e3a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.00) 28%),
        radial-gradient(circle at center, var(--bg-deep) 0%, var(--bg) 100%);
      color: var(--ivory);
      overflow: hidden;
    }

    body {
      font-family: "Playfair Display", serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .gate {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .gate-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform: translateY(-2vh);
      width: 100%;
      max-width: 900px;
    }

    .hero-logo {
      width: clamp(240px, 28vw, 420px);
      height: auto;
      display: block;
      margin: 0 auto 26px auto;
      filter:
        drop-shadow(0 16px 34px rgba(0, 0, 0, 0.42))
        drop-shadow(0 2px 7px rgba(198, 169, 107, 0.14));
      image-rendering: auto;
    }

    .company-name {
      font-family: "Playfair Display", serif;
      font-size: clamp(30px, 3vw, 44px);
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: 0.01em;
      color: var(--ivory);
      margin-bottom: 50px;
    }

    .enter-link {
      font-family: "Playfair Display", serif;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.22em;
      color: var(--gold);
      text-decoration: none;
      display: inline-block;
      position: relative;
      padding-bottom: 4px;
    }

    .enter-link::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 100%;
      height: 1px;
      background: var(--gold);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 180ms ease;
    }

    .enter-link:hover::after {
      transform: scaleX(1);
    }

    .enter-link:visited,
    .enter-link:active,
    .enter-link:focus {
      color: var(--gold);
    }

    @media (max-width: 768px) {
      .gate {
        padding: 24px 16px;
      }

      .gate-inner {
        transform: translateY(-1vh);
      }

      .hero-logo {
        width: clamp(180px, 46vw, 260px);
        margin-bottom: 20px;
      }

      .company-name {
        font-size: clamp(24px, 7vw, 34px);
        margin-bottom: 38px;
      }

      .enter-link {
        font-size: 16px;
        letter-spacing: 0.18em;
      }
    }
  </style>
</head>
<body>
  <main class="gate">
    <div class="gate-inner">
      <img
        src="phoenix-os-logo.png"
        alt="Rising Phoenix Enterprises logo"
        class="hero-logo"
      />

      <h1 class="company-name">Rising Phoenix Enterprises</h1>

      <a href="institution.html" class="enter-link">ENTER</a>
    </div>
  </main>
</body>
</html>
