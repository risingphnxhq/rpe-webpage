<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rising Phoenix Enterprises</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#000;
  --ivory:#f5f1e8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  height:100%;
  background:var(--bg);
  color:var(--ivory);
  font-family:"IBM Plex Mono","Courier New",monospace;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

/* HERO */

.hero{
  position:relative;
  height:70vh;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  overflow:hidden;
  background:
    radial-gradient(circle at center, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0) 24%),
    radial-gradient(circle at center, rgba(0,0,0,.10), #000 72%);
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:url("phoenix-os-logo.png") center 40% / 520px no-repeat;
  opacity:0;
  filter:
    drop-shadow(0 22px 54px rgba(0,0,0,.60))
    drop-shadow(0 0 22px rgba(168,116,34,.15));
  animation:heroFade 1.4s ease forwards;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(168,116,34,.10) 0%, rgba(168,116,34,0) 36%);
  mix-blend-mode:screen;
  opacity:.42;
  animation:glowPulse 4.8s ease-in-out infinite;
}

/* CONTENT */

.content{
  height:30vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding-top:30px;
  text-align:center;
}

/* TITLE */

.title{
  font-size:clamp(14px,1.05vw,18px);
  letter-spacing:.22em;
  text-transform:uppercase;
  margin-bottom:28px;
  min-height:1.5em;
  opacity:0;
  animation:titleFade .7s ease .9s forwards;
}

.cursor{
  display:inline-block;
  width:2px;
  height:1em;
  background:#a87422;
  margin-left:5px;
  animation:blink .9s infinite;
}

/* 🔥 METALLIC HERO MATCH ENTER BUTTON */

.enter{
  position:relative;
  overflow:hidden;

  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:210px;
  margin-top:10px;
  padding:14px 44px;

  font-size:14px;
  letter-spacing:.18em;
  text-transform:uppercase;
  text-decoration:none;
  color:#111;

  background:linear-gradient(
    145deg,
    #c9973e 0%,
    #a87422 28%,
    #6f4a14 50%,
    #5e3e10 62%,
    #a87422 78%,
    #e0b85a 100%
  );

  border:1px solid #6b4714;
  border-radius:2px;

  box-shadow:
    0 0 10px rgba(168,116,34,.35),
    inset 0 1px 0 rgba(255,255,255,.15),
    inset 0 -3px 10px rgba(0,0,0,.7);

  opacity:0;
  transform:translateY(8px);
  animation:enterFade .8s ease 2.5s forwards;
  transition:all .25s ease;
}

/* SHINE SWEEP */

.enter::after{
  content:"";
  position:absolute;
  top:-40%;
  left:-60%;
  width:60%;
  height:180%;

  background:linear-gradient(
    120deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,.35) 40%,
    rgba(255,255,255,.75) 50%,
    rgba(255,255,255,.35) 60%,
    rgba(255,255,255,0) 100%
  );

  transform:rotate(18deg);
  opacity:.25;
  animation:shineSweep 4.8s linear infinite;
}

.enter:hover{
  box-shadow:
    0 0 18px rgba(168,116,34,.55),
    inset 0 1px 0 rgba(255,255,255,.25),
    inset 0 -3px 12px rgba(0,0,0,.8);
}

.enter:active{
  transform:translateY(1px);
  box-shadow:inset 0 4px 14px rgba(0,0,0,.9);
}

/* ANIMATIONS */

@keyframes heroFade{
  from{opacity:0; transform:scale(.985);}
  to{opacity:1; transform:scale(1);}
}

@keyframes glowPulse{
  0%,100%{opacity:.34;}
  50%{opacity:.58;}
}

@keyframes titleFade{
  from{opacity:0; transform:translateY(6px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes enterFade{
  to{opacity:1; transform:translateY(0);}
}

@keyframes blink{
  0%,50%,100%{opacity:1;}
  25%,75%{opacity:0;}
}

@keyframes shineSweep{
  from{left:-60%;}
  to{left:140%;}
}

/* MOBILE */

@media(max-width:768px){

.hero{height:65vh;}

.hero::before{
background:url("phoenix-os-logo.png") center 38% / 320px no-repeat;
}

.content{height:35vh; padding-top:22px;}

.enter{
min-width:180px;
padding:12px 28px;
}

}

</style>
</head>

<body>

<section class="hero"></section>

<section class="content">

<h1 class="title">
<span id="typed"></span><span class="cursor"></span>
</h1>

<a href="institution.html" class="enter">ENTER</a>

</section>

<script>

const text="Rising Phoenix Enterprises";
const typed=document.getElementById("typed");

let i=0;

function typeEffect(){
if(i<text.length){
typed.textContent+=text.charAt(i);
i++;
setTimeout(typeEffect,55);
}
}

window.addEventListener("load",()=>{
setTimeout(typeEffect,850);
});

</script>

</body>
</html>
