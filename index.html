<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rising Phoenix Enterprises</title>
  <link rel="stylesheet" href="shared.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    .entry-gate {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: radial-gradient(circle at center, #020202 0%, #000000 100%);
    }

    .entry-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform: translateY(-2vh);
    }

    .entry-logo {
      width: 220px;
      max-width: 52vw;
      height: auto;
      margin-bottom: 22px;
      opacity: 0.98;
      filter: drop-shadow(0 14px 30px rgba(0, 0, 0, 0.35));
    }

    .entry-title {
      font-family: "Playfair Display", serif;
      font-size: clamp(28px, 2.6vw, 42px);
      font-weight: 500;
      letter-spacing: 0.01em;
      line-height: 1.2;
      color: #f5f1e8;
      margin: 0;
    }

    .entry-link {
      margin-top: 54px;
      font-family: "Playfair Display", serif;
      font-size: 18px;
      letter-spacing: 0.18em;
      color: #c6a96b;
      text-decoration: none;
      position: relative;
      display: inline-block;
    }

    .entry-link::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 100%;
      height: 1px;
      background: #c6a96b;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 180ms ease;
    }

    .entry-link:hover::after {
      transform: scaleX(1);
    }

    @media (max-width: 768px) {
      .entry-logo {
        width: 170px;
        margin-bottom: 18px;
      }

      .entry-link {
        margin-top: 42px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="entry-gate">
    <div class="entry-wrap">
      <img
        src="phoenix-os-logo.png"
        alt="Rising Phoenix Enterprises logo"
        class="entry-logo"
      />

      <h1 class="entry-title">Rising Phoenix Enterprises</h1>

      <a href="institution.html" class="entry-link">ENTER</a>
    </div>
  </main>
</body>
</html>
