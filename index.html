<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rising Phoenix Enterprises</title>
  <meta name="description" content="Rising Phoenix Enterprises" />
  <style>
    :root {
      --black: #000000;
      --ivory: #F5F1E8;
      --gold: #C6A96B;
      --content-max: 1100px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--black);
      color: var(--ivory);
      min-height: 100%;
    }

    body {
      font-family: Inter, "Helvetica Neue", Arial, sans-serif;
    }

    .gate {
      min-height: 100vh;
      width: 100%;
      padding: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gate-inner {
      width: 100%;
      max-width: var(--content-max);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .logo {
      width: 120px;
      height: auto;
      display: block;
      margin: 0 0 24px 0;
    }

    h1 {
      margin: 0 0 32px 0;
      color: var(--ivory);
      font-family: "Playfair Display", Georgia, serif;
      font-size: 64px;
      font-weight: 500;
      line-height: 1.05;
      letter-spacing: -0.01em;
    }

    .enter {
      color: var(--ivory);
      text-decoration: none;
      font-family: Inter, "Helvetica Neue", Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .enter:hover {
      text-decoration: underline;
      text-underline-offset: 4px;
      color: var(--gold);
    }

    @media (max-width: 1024px) {
      .gate {
        padding: 32px;
      }

      h1 {
        font-size: 42px;
      }
    }

    @media (max-width: 640px) {
      .gate {
        padding: 16px;
      }

      .logo {
        width: 96px;
        margin-bottom: 24px;
      }

      h1 {
        font-size: 34px;
      }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
</head>
<body>
  <main class="gate">
    <div class="gate-inner">
      <img src="phoenix-os-logo.png" alt="Rising Phoenix Enterprises logo" class="logo" />
      <h1>Rising Phoenix Enterprises</h1>
      <a class="enter" href="institution.html">Enter</a>
    </div>
  </main>
</body>
</html>
