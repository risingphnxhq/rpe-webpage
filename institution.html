<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rising Phoenix Enterprises | Institution</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#050505;
      --bg-2:#0b0b0b;
      --panel:rgba(255,255,255,.03);
      --panel-2:rgba(255,255,255,.045);
      --line:rgba(214,168,76,.18);
      --line-strong:rgba(214,168,76,.38);
      --gold:#d6a84c;
      --gold-2:#f0c76a;
      --gold-deep:#8f6119;
      --text:#f2e8d7;
      --text-soft:#d7ccba;
      --text-mute:#9f9484;
      --max:1220px;
      --blur:18px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      min-height:100%;
      background:
        radial-gradient(circle at 50% 15%, rgba(214,168,76,.08), transparent 26%),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.035), transparent 20%),
        linear-gradient(180deg, #090909 0%, #040404 100%);
      color:var(--text);
      font-family:"Inter", Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      scroll-behavior:smooth;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size:40px 40px;
      mask-image:radial-gradient(circle at center, black 38%, transparent 90%);
      opacity:.16;
    }

    .wrap{
      position:relative;
      width:min(calc(100% - 48px), var(--max));
      margin:0 auto;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      backdrop-filter:blur(16px);
      background:linear-gradient(180deg, rgba(5,5,5,.86), rgba(5,5,5,.55));
      border-bottom:1px solid rgba(255,255,255,.05);
    }

    .topbar-inner{
      width:min(calc(100% - 48px), var(--max));
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      min-height:72px;
      gap:20px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      text-decoration:none;
      color:var(--text);
    }

    .brand-mark{
      width:38px;
      height:38px;
      border:1px solid var(--line);
      border-radius:50%;
      display:grid;
      place-items:center;
      background:radial-gradient(circle at 35% 30%, rgba(240,199,106,.18), rgba(214,168,76,.04) 45%, rgba(255,255,255,0) 70%);
      box-shadow:0 0 24px rgba(214,168,76,.12);
      overflow:hidden;
      flex-shrink:0;
    }

    .brand-mark img{
      width:26px;
      height:26px;
      object-fit:contain;
      filter:drop-shadow(0 0 10px rgba(214,168,76,.25));
    }

    .brand-copy small{
      display:block;
      color:var(--text-mute);
      letter-spacing:.22em;
      font-size:10px;
      text-transform:uppercase;
      margin-bottom:3px;
      font-family:"IBM Plex Mono","Courier New",monospace;
    }

    .brand-copy strong{
      display:block;
      font-family:"Cormorant Garamond", serif;
      font-size:22px;
      font-weight:600;
      letter-spacing:.01em;
      color:var(--text);
      line-height:1;
    }

    .topnav{
      display:flex;
      gap:22px;
      flex-wrap:wrap;
    }

    .topnav a{
      color:var(--text-soft);
      text-decoration:none;
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
      position:relative;
      font-family:"IBM Plex Mono","Courier New",monospace;
    }

    .topnav a::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-6px;
      width:100%;
      height:1px;
      background:linear-gradient(90deg, transparent, var(--gold), transparent);
      transform:scaleX(0);
      transform-origin:center;
      transition:transform .22s ease;
    }

    .topnav a:hover{
      color:var(--text);
    }

    .topnav a:hover::after{
      transform:scaleX(1);
    }

    .hero{
      padding:76px 0 42px;
    }

    .hero-panel{
      position:relative;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.06);
      background:
        linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.02)),
        radial-gradient(circle at 50% 0%, rgba(214,168,76,.12), transparent 38%);
      backdrop-filter:blur(var(--blur));
      border-radius:28px;
      padding:52px 42px 34px;
      box-shadow:
        0 20px 70px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.05);
    }

    .hero-panel::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,.03) 48%, transparent 52%);
      opacity:.6;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      color:var(--gold-2);
      font-size:11px;
      letter-spacing:.24em;
      text-transform:uppercase;
      margin-bottom:18px;
      font-family:"IBM Plex Mono","Courier New",monospace;
    }

    .eyebrow::before{
      content:"";
      width:42px;
      height:1px;
      background:linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    h1{
      font-family:"Cormorant Garamond", serif;
      font-weight:600;
      font-size:clamp(40px, 5.2vw, 64px);
      letter-spacing:.015em;
      line-height:.96;
      margin-bottom:18px;
      color:var(--text);
      text-shadow:0 8px 30px rgba(0,0,0,.45);
      max-width:900px;
    }

    .hero-sub{
      max-width:880px;
      color:var(--text-soft);
      font-size:16px;
      line-height:1.9;
      margin-bottom:30px;
      font-family:"Inter", Arial, sans-serif;
    }

    .hero-meta{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:18px;
      margin-top:24px;
    }

    .meta-card{
      border:1px solid rgba(255,255,255,.06);
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border-radius:20px;
      padding:20px 20px 18px;
      min-height:130px;
    }

    .meta-label{
      color:var(--gold-2);
      font-size:10px;
      letter-spacing:.22em;
      text-transform:uppercase;
      margin-bottom:12px;
      font-family:"IBM Plex Mono","Courier New",monospace;
    }

    .meta-value{
      font-family:"Cormorant Garamond", serif;
      font-size:28px;
      line-height:1;
      margin-bottom:10px;
      color:var(--text);
    }

    .meta-copy{
      color:var(--text-mute);
      font-size:13px;
      line-height:1.8;
      font-family:"Inter", Arial, sans-serif;
    }

    .grid{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:24px;
      padding:18px 0 84px;
    }

    .stack{
      display:grid;
      gap:24px;
    }

    .card{
      position:relative;
      border:1px solid rgba(255,255,255,.06);
      background:
        linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.015));
      backdrop-filter:blur(var(--blur));
      border-radius:26px;
      padding:28px 26px;
      overflow:hidden;
      box-shadow:0 14px 50px rgba(0,0,0,.28);
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at top right, rgba(214,168,76,.10), transparent 28%);
      opacity:.8;
    }

    .section-tag{
      color:var(--gold-2);
      font-size:10px;
      letter-spacing:.22em;
      text-transform:uppercase;
      margin-bottom:14px;
      font-family:"IBM Plex Mono","Courier New",monospace;
    }

    .card h2{
      font-family:"Cormorant Garamond", serif;
      font-size:34px;
      font-weight:600;
      line-height:1;
      margin-bottom:14px;
      color:var(--text);
    }

    .card p{
      color:var(--text-soft);
      font-size:15px;
      line-height:1.95;
      font-family:"Inter", Arial, sans-serif;
    }

    .list{
      display:grid;
      gap:16px;
      margin-top:20px;
    }

    .list-item{
      display:grid;
      grid-template-columns:18px 1fr;
      gap:14px;
      align-items:start;
    }

    .list-item .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%, var(--gold-2), var(--gold-deep));
      margin-top:9px;
      box-shadow:0 0 12px rgba(214,168,76,.35);
    }

    .list-item strong{
      display:block;
      color:var(--text);
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      margin-bottom:6px;
      font-family:"IBM Plex Mono","Courier New",monospace;
    }

    .list-item span{
      color:var(--text-mute);
      font-size:14px;
      line-height:1.85;
      font-family:"Inter", Arial, sans-serif;
    }

    .domain-grid{
      display:grid;
      gap:14px;
      margin-top:18px;
    }

    .domain{
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;
      padding:16px 16px 14px;
      background:rgba(255,255,255,.02);
    }

    .domain h3{
      color:var(--text);
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      margin-bottom:8px;
      font-family:"IBM Plex Mono","Courier New",monospace;
    }

    .domain p{
      color:var(--text-mute);
      font-size:14px;
      line-height:1.8;
      font-family:"Inter", Arial, sans-serif;
    }

    .rail{
      display:grid;
      gap:24px;
    }

    .mini-card{
      border:1px solid rgba(255,255,255,.06);
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border-radius:22px;
      padding:22px 20px;
    }

    .mini-card h3{
      font-family:"Cormorant Garamond", serif;
      font-size:28px;
      font-weight:600;
      margin-bottom:12px;
      color:var(--text
